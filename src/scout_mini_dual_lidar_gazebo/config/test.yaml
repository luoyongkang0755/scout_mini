amcl:
  ros__parameters:
    use_sim_time: True
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha15: 0.2
    base_frame_id: "base_link"
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false

    odom_frame_id: "odom"
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    laser_model_type: "likelihood_field"
    max_beams: 60
    max_particles: 2000
    min_particles: 500



    global_frame_id: "map"
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 25.0
    laser_min_range: -1.0
    robot_model_type: "differential"
    save_pose_rate: 0.5
    sigma_hit: 0.2
    tf_broadcast: true
    transform_tolerance: 0.5
    update_min_a: 0.2
    update_min_d: 0.25
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05
    scan_topic: /merged/scan

 bt_navigator:
  ros__parameters:
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    default_nav_to_pose_bt_xml: ""
    default_nav_through_poses_bt_xml: ""
    plugin_lib_names: ["nav2_bt"]
    nav2_bt:
    use_sim_time: True

controller_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 20.0
    controller_plugins: ["FollowPath"]
    
progress_checker:
  plugin: "nav2_controller::SimulatedProgressChecker"
  required_movement_radius: 0.5
  movement_time_allowance: 10.0

general_goal_checker:
  plugin: "nav2_controller::GeneralGoalChecker"
  xy_goal_tolerance: 0.5
  yaw_goal_tolerance: 0.5


FollowPath:
  plugin: "nav2_controller::FollowPath"
  min_x_velocity_threshold: 0.001
  min_y_velocity_threshold: 0.001
  min_theta_velocity_threshold: 0.001
  acc_lim_x: 0.5
  acc_lim_theta: 0.5
  decel_lim_x: -1.0
  vx_samples: 10

critics:
  - "RotateToGoal"
  - "nav2_controller::VelocityCritics"
  - "nav2_controller::TrajectoryCritics"
  - "nav2_controller::GoalCritics"

failure_tolerance: 0.3
progress_checker_plugin: "progress_checker"
goal_checker_plugins: ["general_goal_checker"]


local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: True
      map_frequency: 1.0
      publish_frequency: 1.0
      static_map: True
      global_frame: "map"
      robot_base_frame: "base_link"
      footprint_topic: "local_costmap/published_footprint"
      costmap_topic: "local_costmap/costmap_raw"


global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: True
      map_frequency: 1.0
      publish_frequency: 1.0
      static_map: True
      global_frame: "map"
      robot_base_frame: "base_link"
      footprint_topic: "global_costmap/published_footprint"
      costmap_topic: "global_costmap/costmap"


planner_server:
  ros__parameters:
    expected_planner_frequency: 1.0
    use_sim_time: True
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true


recoveries_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    recovery_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_recoveries/Spin"
    backup:
      plugin: "nav2_recoveries/BackUp"
    wait:
      plugin: "nav2_recoveries/Wait"


waypoint_follower:
  ros__parameters:
    use_sim_time: True
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"

